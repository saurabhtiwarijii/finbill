name: finbill
description: AI-powered business assistant and billing system for Indian SMEs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  go_router: ^14.8.1
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  image_picker: ^1.2.1
  pdf: ^3.12.0
  printing: ^5.14.3
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
